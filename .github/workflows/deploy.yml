name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/gateway/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/loopy-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Auth
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/auth/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/loopy-auth:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Project
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/project/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/loopy-project:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Chat
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/chat/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/loopy-chat:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Meeting
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/meeting/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/loopy-meeting:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Transcription
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/transcription/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/loopy-transcription:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "~/loopy"

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/loopy
            # Log in to GHCR on the VPS
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            # Set repository owner for docker-compose
            export GITHUB_REPOSITORY_OWNER=${{ github.repository_owner }}
            # Pull latest images and restart
            docker-compose pull
            docker-compose up -d
            # Clean up old images
            docker image prune -f
